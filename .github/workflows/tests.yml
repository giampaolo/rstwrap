on: [push, pull_request]
concurrency:
  # Cancel build if a new one starts, but don't interrupt all jobs on the first
  # failure.
  group: build-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Run tests
      run: |
        pip install .[test]
        make test-parallel
    - name: Run linters
      run: |
        pip install .[lint]
        make lint-all
        make lint-release
